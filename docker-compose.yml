version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hexacore_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-hexacore_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hexacore_pass}
      POSTGRES_DB: ${DB_NAME:-hexacore_db}
    ports:
      - "5433:5432"
    volumes:
      - hexacore_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hexacore_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: hexacore_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-hexacore_user}:${DB_PASSWORD:-hexacore_pass}@db:5432/${DB_NAME:-hexacore_db}?schema=public
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_here}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_BASIC=${STRIPE_PRICE_BASIC}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO}
      - STRIPE_PRICE_ENTERPRISE=${STRIPE_PRICE_ENTERPRISE}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}

volumes:
  hexacore_data:
